name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav \
          libgstreamer-plugins-base1.0-dev libasound2-dev openjdk-17-jdk \
          autoconf automake libtool m4 autotools-dev pkg-config libltdl-dev
        
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
        ACLOCAL_PATH: "/usr/share/aclocal"
      run: |
        # تهيئة ملفات رخص الأندرويد
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # تنظيف كاش التجميع الشامل للنظام لضمان عدم استدعاء مكاتب معطوبة
        echo "Forcing global buildozer and p4a clean..."
        rm -rf ~/.buildozer/
        rm -rf ~\.local/share/python-for-android/
        
        # تشغيل البناء مع الموافقة التلقائية
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
