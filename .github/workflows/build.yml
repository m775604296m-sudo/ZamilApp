name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        
        # تثبيت حزمة libunwind لمنع تعارض مكاتب الوسائط
        sudo apt-get install -y libunwind-dev
        
        # تثبيت أدوات البناء مع OpenJDK 11 لضمان عمل sdkmanager بدون مشاكل توافق
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          openjdk-11-jdk autoconf automake libtool m4 pkg-config libltdl-dev \
          zip unzip autotools-dev
        
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
        ACLOCAL_PATH: "/usr/share/aclocal"
        ANDROID_HOME: "/home/runner/.buildozer/android/platform/android-sdk"
      run: |
        # 1. تهيئة مسارات رخص وأدوات الأندرويد
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 2. تنظيف الكاش القديم تماماً لتهيئة بيئة بناء نظيفة
        echo "Clearing global caches..."
        rm -rf ~/.buildozer/
        rm -rf .buildozer/
        
        # 3. إنشاء مجلد الرخص والموافقة الصامتة عليها مسبقاً لمنع انهيار الـ sdkmanager
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "89354d86f5b6378bd29d15220ee14c53021975b1\n24333f1a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8ec1\n494b6a28734dd2a72bcbc7b30fbc4ee0f6e4550d" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "84931b71126b7447a79a9e14304c4c1926d4c022" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        
        # 4. تشغيل البناء بشكل مباشر وصارم (سيتكفل بيلدوزر بتحميل الإصدارات المتوافقة تلقائياً)
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
