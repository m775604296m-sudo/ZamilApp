name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        
        # تثبيت حزمة الدعم الأساسية لحل تعارض الاعتماديات
        sudo apt-get install -y libunwind-dev
        
        # تثبيت أدوات بناء الأندرويد الكاملة مع OpenJDK 11
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          openjdk-11-jdk autoconf automake libtool m4 pkg-config libltdl-dev \
          zip unzip autotools-dev
        
        pip install --upgrade pip
        # تثبيت إصدار مستقر ومضمون يتوافق مع أندرويد 33 والـ NDK المختار
        pip install "buildozer==1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
        ACLOCAL_PATH: "/usr/share/aclocal"
      run: |
        # 1. تهيئة مسارات رخص الأندرويد في البيئة السحابية
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 2. خطوة حاسمة: تدمير وحذف أي كاش قديم ومخفي في السيرفر لمنع تكرار الخطأ
        echo "Destroying old caches strictly..."
        rm -rf ~/.buildozer/
        rm -rf .buildozer/
        
        # 3. تشغيل البناء الصارم وقراءة ملف buildozer.spec النظيف
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
