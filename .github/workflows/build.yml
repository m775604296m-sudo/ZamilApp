name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # إضافة حزم التجميع الكاملة لحل مشكلة الماكرو والـ libffi
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav \
          libgstreamer-plugins-base1.0-dev libasound2-dev openjdk-17-jdk \
          autoconf automake libtool m4 autotools-dev pkg-config
        
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
      run: |
        # تهيئة مسبقة لملفات رخص أندرويد لضمان بناء صامت ومستقر
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # تشغيل البناء وتمرير الموافقة التلقائية على أي حزمة
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
