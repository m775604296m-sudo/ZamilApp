name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        
        # تثبيت حزمة libunwind لمنع تعارض مكاتب الوسائط
        sudo apt-get install -y libunwind-dev
        
        # تثبيت أدوات البناء مع OpenJDK 11 لضمان عمل sdkmanager بدون مشاكل توافق
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          openjdk-11-jdk autoconf automake libtool m4 pkg-config libltdl-dev \
          zip unzip autotools-dev
        
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
        ACLOCAL_PATH: "/usr/share/aclocal"
      run: |
        # تهيئة مسارات رخص الأندرويد
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # تنظيف الكاش القديم تماماً لتهيئة الـ SDK النظيف
        echo "Clearing global caches..."
        rm -rf ~/.buildozer/
        rm -rf .buildozer/
        
        # تشغيل البناء مباشرة ودع بيلدوزر يجلب الـ SDKManager المتوافق تلقائياً
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
