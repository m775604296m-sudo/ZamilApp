name: Build Zamil App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        
        # تثبيت حزم الدعم الأساسية وحل مشكلة تعارض الاعتماديات المكسورة
        sudo apt-get install -y libunwind-dev
        
        # تثبيت أدوات بناء الأندرويد و Kivy المستقرة
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev \
          openjdk-17-jdk autoconf automake libtool m4 pkg-config libltdl-dev \
          zip unzip
        
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      env:
        APP_ALLOW_INTERACTIVE: "0"
        TERM: xterm
        ACLOCAL_PATH: "/usr/share/aclocal"
      run: |
        # تهيئة ملفات رخص الأندرويد
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # تنظيف الكاش القديم لضمان تجميع نظيف تماماً
        echo "Clearing global caches..."
        rm -rf ~/.buildozer/
        rm -rf ~/.local/share/python-for-android/
        
        # تشغيل البناء مع الموافقة التلقائية
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZamilApp-APK
        path: bin/*.apk
